name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-whatsapp:
    name: Test WhatsApp Backend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test -- --reporter=junit --outputFile=test-results/junit.xml
        continue-on-error: true

      - name: Run security audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-whatsapp
          path: test-results/junit.xml
          retention-days: 7
        continue-on-error: true

  lint-whatsapp:
    name: Lint WhatsApp Backend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Check for excessive console statements
        run: |
          COUNT=$(grep -r "console\.log\|console\.error" src --include="*.js" | grep -v "test\|spec\|debug\|// " | wc -l | tr -d ' ')
          echo "console.log/error count: $COUNT"
          if [ "$COUNT" -gt 50 ]; then
            echo "Too many console statements — consider replacing with logger"
            exit 1
          fi
        continue-on-error: true
