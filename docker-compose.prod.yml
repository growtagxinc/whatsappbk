# Production docker-compose for WhatsApp Engine on AWS VPS
# Usage: docker compose -f docker-compose.prod.yml up -d
#
# Prerequisites on VPS:
#   1. Docker installed
#   2. .env.prod file created with production secrets
#   3. Named volumes auto-created by Docker

services:
  whatsapp-engine:
    image: ghcr.io/growtagxinc/concertos-whatsapp:latest
    container_name: concertos-whatsapp
    restart: always
    ports:
      - "80:3000"
    env_file:
      - .env.prod
    environment:
      - NODE_ENV=production
      - PORT=3000
    # Named volumes persist WhatsApp session data across redeploys
    volumes:
      - concertos-wwebjs:/app/.wwebjs_auth
      - concertos-logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

volumes:
  # Persists WhatsApp session/auth tokens across container restarts
  concertos-wwebjs:
    driver: local
  # Persists application logs for debugging
  concertos-logs:
    driver: local
